<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Files List | Billing App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{ font-family:Segoe UI, sans-serif; background:#f4f6f8; color:#222; }
.container{ max-width:700px; margin:40px auto; background:#fff; border-radius:16px; box-shadow:0 4px 16px #0001; padding:32px; }
h1{ text-align:center; }
.search-bar{ display:flex; gap:10px; margin-bottom:24px; }
.search-bar input{ flex:1; padding:8px 12px; border-radius:6px; border:1px solid #ccc; font-size:15px; }
.search-bar button{ padding:8px 18px; border-radius:6px; border:none; background:#2563eb; color:#fff; font-weight:bold; cursor:pointer; }
.search-bar button:hover{ background:#1d4ed8; }
.file-list{ margin-top:16px; }
.file-item{ display:flex; justify-content:space-between; align-items:center; padding:16px 0; border-bottom:1px solid #eee; background:#f9fafc; border-radius:8px; margin-bottom:8px; }
.file-item:last-child{ border-bottom:none; }
.file-name{ font-weight:bold; font-size:16px; color:#2563eb; }
.file-date{ color:#888; font-size:13px; margin-top:4px; }
.btn-group{ display:flex; gap:10px; }
.download-btn, .delete-btn{ background:#2563eb; color:#fff; border:none; border-radius:6px; padding:8px 16px; cursor:pointer; font-size:14px; transition:.2s; }
.download-btn:hover{ background:#1d4ed8; }
.delete-btn{ background:#dc2626; }
.delete-btn:hover{ background:#b91c1c; }
</style>
</head>
<body>
<div class="container">
  <h1>Saved Invoices (PDF)</h1>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by Invoice No, Name, or Date...">
    <button onclick="renderFiles()">Search</button>
    <button onclick="clearSearch()" style="background:#888;">Clear</button>
  </div>
  <div class="file-list" id="fileList"></div>
  <button onclick="window.location.href='home.html'" style="margin-top:24px;">⬅ Back to Home</button>
</div>
<script>
function renderFiles(){
  let files = JSON.parse(localStorage.getItem('invoices')||'[]');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if(q) {
    files = files.filter(f =>
      f.name.toLowerCase().includes(q) ||
      (f.date && new Date(f.date).toLocaleString().toLowerCase().includes(q))
    );
  }
  const list = document.getElementById('fileList');
  if(files.length===0){
    list.innerHTML = '<p>No invoices found.</p>';
    return;
  }
  list.innerHTML = files.map((f,i)=>`
    <div class="file-item">
      <div>
        <span class="file-name">${f.name}</span><br>
        <span class="file-date">${new Date(f.date).toLocaleString()}</span>
      </div>
      <div class="btn-group">
        <button class="download-btn" onclick="downloadPDF(${i})">Download PDF</button>
        <button class="delete-btn" onclick="deletePDF(${i})">Delete</button>
      </div>
    </div>
  `).join('');
}
function downloadPDF(idx){
  let files = JSON.parse(localStorage.getItem('invoices')||'[]');
  const file = files[idx];
  const a = document.createElement('a');
  a.href = file.data;
  a.download = file.name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
function deletePDF(idx){
  let files = JSON.parse(localStorage.getItem('invoices')||'[]');
  files.splice(idx,1);
  localStorage.setItem('invoices', JSON.stringify(files));
  renderFiles();
}
function clearSearch(){
  document.getElementById('searchInput').value = '';
  renderFiles();
}
renderFiles();
</script>
</body>
</html>
