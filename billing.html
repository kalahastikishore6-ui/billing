<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Billing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#0b0f14;
  --panel:#121826;
  --line:#273244;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#22c55e;
  --accent2:#38bdf8;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:"Segoe UI",system-ui,sans-serif;
}

/* HEADER */
.header{
  padding:16px;
  border-bottom:1px solid var(--line);
}
.header h2{
  margin:0;
  font-size:22px;
}
.header p{
  margin:4px 0 0;
  color:var(--muted);
  font-size:13px;
}

/* BILL INFO */
.info{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:12px 16px;
  border-bottom:1px solid var(--line);
}
.info input{
  background:transparent;
  border:none;
  border-bottom:1px solid var(--line);
  padding:8px 4px;
  color:#fff;
  font-size:15px;
}

/* ITEMS */
.items{
  padding:10px 16px;
}
.item{
  border-bottom:1px solid var(--line);
  padding:12px 0;
}
.item-name{
  font-size:16px;
  margin-bottom:8px;
}
.item input{
  background:transparent;
  border:none;
  border-bottom:1px solid var(--line);
  color:#fff;
  font-size:15px;
  padding:6px 4px;
}
.row{
  display:flex;
  gap:10px;
}
.row input{
  flex:1;
}

/* TOTALS */
.totals{
  padding:16px;
  border-top:1px solid var(--line);
}
.total-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}
.total-row span{
  color:var(--muted);
}
.total-row strong{
  color:var(--accent2);
}
.grand{
  font-size:20px;
  font-weight:700;
  color:var(--accent);
}

/* BUTTONS */
.actions{
  position:sticky;
  bottom:0;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.7));
  padding:16px;
  display:flex;
  gap:12px;
}
button{
  flex:1;
  border:none;
  border-radius:14px;
  padding:14px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}
.add{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#000;
}
.print{
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  color:#000;
}

/* PRINT */
@media print{
  body{background:#fff;color:#000}
  .actions{display:none}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>Product Billing</h2>
  <p>Quick product list & billing</p>
</div>

<!-- BILL INFO -->
<div class="info">
  <input placeholder="Customer Name">
  <input placeholder="Bill No">
  <input placeholder="Date">
  <input placeholder="Vehicle / Ref">
</div>

<!-- ITEMS -->
<div class="items" id="items">
  <div class="item">
    <input class="item-name" placeholder="Product name">
    <div class="row">
      <input type="number" placeholder="Qty" oninput="calc()">
      <input type="number" placeholder="Rate (₹)" oninput="calc()">
      <input type="number" placeholder="Amount" readonly>
    </div>
  </div>
</div>

<!-- TOTALS -->
<div class="totals">
  <div class="total-row">
    <span>Subtotal (₹)</span>
    <strong id="subtotal">0.00</strong>
  </div>
  <div class="total-row">
    <span>Extra Charge (%)</span>
    <input type="number" id="extra" value="0" oninput="calc()" style="width:80px;background:transparent;border:none;border-bottom:1px solid var(--line);color:#fff">
  </div>
  <div class="total-row">
    <span>Rounding (₹)</span>
    <input type="number" id="round" value="0" oninput="calc()" style="width:80px;background:transparent;border:none;border-bottom:1px solid var(--line);color:#fff">
  </div>
  <div class="total-row grand">
    <span>Total (₹)</span>
    <span id="total">0.00</span>
  </div>
</div>

<!-- ACTIONS -->
<div class="actions">
  <button class="add" onclick="addItem()">＋ Add Item</button>
  <button class="print" onclick="window.print()">🖨 Print</button>
</div>

<script>
function addItem(){
  const div=document.createElement("div");
  div.className="item";
  div.innerHTML=`
    <input class="item-name" placeholder="Product name">
    <div class="row">
      <input type="number" placeholder="Qty" oninput="calc()">
      <input type="number" placeholder="Rate (₹)" oninput="calc()">
      <input type="number" placeholder="Amount" readonly>
    </div>`;
  document.getElementById("items").appendChild(div);
}

function calc(){
  let subtotal=0;
  document.querySelectorAll(".item").forEach(item=>{
    const inputs=item.querySelectorAll("input");
    const qty=+inputs[1].value||0;
    const rate=+inputs[2].value||0;
    const amt=qty*rate;
    inputs[3].value=amt.toFixed(2);
    subtotal+=amt;
  });

  const extra=+document.getElementById("extra").value||0;
  const round=+document.getElementById("round").value||0;

  let total=subtotal + (subtotal*extra/100) + round;

  document.getElementById("subtotal").innerText=subtotal.toFixed(2);
  document.getElementById("total").innerText=total.toFixed(2);
}
</script>

</body>
</html>
